<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل مريض - مستشفى السلاح الطبي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-dark: #b8860b; 
            --deep-blue: #0f172a; 
            --medical-green: #14532d;
            --medical-green-hover: #166534;
            --bg-body: #f8fafc; 
            /* درجة اللون الأحمر المطلوبة (ليست غامقة وليست خفيفة) لتأمين أفضل تباين للنصوص البيضاء */
            --custom-red: #c23b3b;
            --custom-red-hover: #a82e2e;
        }
        
        * {
            box-sizing: border-box;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg-body); 
            margin: 0; 
            padding: 0; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container { 
            width: 100%; 
            max-width: 100%; 
            background: #fff; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: none;
        }

        .header { 
            background: #1e293b; 
            padding: 15px 30px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 4px solid var(--gold);
        }

        .header-text { text-align: center; flex-grow: 1; }
        .logo-img { width: 70px; height: auto; filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.3)); }
        .header h1 { margin: 0; font-size: 22px; color: var(--gold); font-weight: 800; }
        .header h2 { margin: 5px 0 0; font-size: 16px; color: #fff; }

        .badge-system { 
            display: inline-block; background: var(--gold); color: #000; padding: 4px 16px; 
            border-radius: 20px; font-size: 12px; font-weight: bold; margin-top: 8px; 
        }

        .form-body { 
            padding: 30px; 
            flex-grow: 1;
            max-width: 1400px; 
            width: 100%;
            margin: 0 auto;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .section-title { 
            grid-column: 1 / -1;
            margin: 25px 0 15px; 
            color: var(--medical-green); 
            font-weight: 800; 
            font-size: 18px; 
            border-bottom: 2px solid #e2e8f0; 
            padding-bottom: 8px; 
        }
        
        .form-control {
            display: flex;
            flex-direction: column;
        }

        label { display: block; margin-bottom: 8px; color: #1e293b; font-weight: 700; font-size: 14px; }
        
        /* تطبيق اللون الأحمر المتوسط المريح على خلفية الحقول، وجعل الخط أبيض وواضح */
        input[type="text"], input[type="tel"], input[type="number"], select, textarea { 
            width: 100%; padding: 12px 15px; 
            border: 2px solid var(--custom-red); 
            border-radius: 8px; box-sizing: border-box; font-family: 'Cairo'; 
            background: var(--custom-red) !important; 
            color: #ffffff !important; 
            font-size: 16px; /* تكبير الخط قليلاً لزيادة وضوح الحروف رقمياً */
            font-weight: bold;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }

        textarea { resize: vertical; min-height: 100px; }
        
        /* لون النص المؤقت (Placeholder) داخل الحقل الأحمر ليصبح مقروءاً */
        input::placeholder, textarea::placeholder { color: rgba(255, 255, 255, 0.75); }

        /* تغيير الخلفية عند الوقوف والتركيز على الحقل لإعطاء طابع تفاعلي ممتاز */
        input:focus, select:focus, textarea:focus { 
            border-color: var(--gold); 
            background: var(--custom-red-hover) !important; 
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.3);
            outline: none;
        }

        /* تعديل المتصفحات لضمان بقاء لون النص الأبيض في الـ Select Option */
        select option {
            background: #fff;
            color: #1e293b;
            font-weight: normal;
        }

        .radio-group { 
            display: flex; gap: 30px; 
            background: #f1f5f9; padding: 12px 20px; border-radius: 8px; 
            border: 1px solid #e2e8f0;
        }
        .radio-group label { margin: 0; cursor: pointer; display: flex; align-items: center; gap: 8px; color: #1e293b; }

        .actions-bar {
            grid-column: 1 / -1;
            display: flex;
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;
        }

        .btn-save { 
            flex-grow: 2; padding: 15px; 
            background: var(--medical-green); 
            color: #fff; border: none; border-radius: 8px; font-size: 17px; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 6px rgba(20, 83, 45, 0.2);
        }
        .btn-save:hover { background: var(--medical-green-hover); }

        .footer-nav { 
            display: flex; justify-content: space-between; margin-top: 30px; 
            padding: 15px 0; border-top: 1px solid #e2e8f0; 
        }
        .footer-nav a { text-decoration: none; color: #64748b; font-size: 14px; font-weight: bold; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: white; padding: 30px; border-radius: 12px; text-align: center; border-top: 6px solid var(--medical-green); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div id="successModal" class="modal-overlay">
        <div class="modal-box">
            <h2 style="color: var(--medical-green); margin-top:0;">✅ تم الحفظ بالمنظومة</h2>
            <p id="msg" style="font-size:16px; color:#334155;"></p>
            <button onclick="closeM()" style="background:var(--deep-blue); color:white; padding:10px 25px; border:none; border-radius:6px; cursor:pointer; font-family:'Cairo'; font-weight:bold;">موافق</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <img src="icon-192.png" alt="شعار" class="logo-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3063/3063176.png'">
            <div class="header-text">
                <h1>مستشفى السلاح الطبي ببورتسودان</h1>
                <h2>قسم النفسية</h2>
                <div class="badge-system">نظام المتابعة الرقمي</div>
            </div>
            <img src="icon-512.png" alt="شعار" class="logo-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3063/3063176.png'">
        </div>

        <div class="form-body">
            <div class="form-grid">
                
                <div class="section-title">👤 البيانات الأساسية والإدارية</div>
                
                <div class="form-control full-width">
                    <label>نوع المريض:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="pType" value="عسكري" checked onclick="toggleType()"> عسكري</label>
                        <label><input type="radio" name="pType" value="مدني" onclick="toggleType()"> مدني</label>
                    </div>
                </div>

                <div class="form-control">
                    <label>كود المريض / الاسم:</label>
                    <input type="text" id="pCode" placeholder="أدخل الكود أو الاسم">
                </div>

                <div class="form-control">
                    <label>العمر:</label>
                    <input type="number" id="pAge" placeholder="أدخل عمر المريض">
                </div>

                <div class="form-control">
                    <label>رقم الهاتف:</label>
                    <input type="tel" id="pPhone" placeholder="0XXXXXXXXX">
                </div>

                <div class="form-control military-fields">
                    <label>الوحدة العسكرية والرتبة:</label>
                    <input type="text" id="pUnit" placeholder="اسم الوحدة / الرتبة">
                </div>
                
                <div class="form-control military-fields">
                    <label>الوضع الإداري الحالي:</label>
                    <select id="pAdminStatus">
                        <option value="في الخدمة">في الخدمة حالياً</option>
                        <option value="إجازة مرضية">في إجازة مرضية</option>
                        <option value="إيقاف مؤقت">إيقاف مؤقت عن العمل</option>
                        <option value="متقاعد">متقاعد / محارب قديم</option>
                    </select>
                </div>

                <div class="form-control full-width" id="addrDiv" style="display:none;">
                    <label>العنوان:</label>
                    <input type="text" id="pAddr" placeholder="السكن / الحي">
                </div>

                <div class="section-title">🩺 التقييم والتاريخ الطبي النفسي</div>

                <div class="form-control">
                    <label>الحالة التشخيصية:</label>
                    <select id="pDiag">
                        <option>قلق عام</option><option>إكتئاب</option><option>اضطراب ثنائي القطب</option>
                        <option>فصام</option><option>اضطراب ما بعد الصدمة</option><option>أخرى</option>
                    </select>
                </div>

                <div class="form-control">
                    <label>درجة خطورة الحالة:</label>
                    <select id="pRiskLevel">
                        <option value="منخفضة">منخفضة (مستقرة)</option>
                        <option value="متوسطة">متوسطة (تحتاج متابعة)</option>
                        <option value="عالية">عالية (حرج / حماية مشددة)</option>
                    </select>
                </div>

                <div class="form-control">
                    <label>التاريخ المرضي السابق والأمراض المزمنة:</label>
                    <input type="text" id="pPastMedical" placeholder="مثال: ضغط، سكري، لا يوجد">
                </div>

                <div class="form-control">
                    <label>التاريخ العائلي للأمراض النفسية:</label>
                    <input type="text" id="pFamilyHistory" placeholder="هل توجد حالات مشابهة في العائلة؟">
                </div>

                <div class="form-control full-width">
                    <label>تاريخ التعرض لصدمات أو ظروف قتالية:</label>
                    <textarea id="pTrauma" placeholder="اكتب تفاصيل الصدمة أو الحالة العملياتية إن وجدت..."></textarea>
                </div>

                <div class="section-title">💊 الخطة العلاجية والتوصيات</div>

                <div class="form-control full-width">
                    <label>الخطة العلاجية والأدوية الموصوفة:</label>
                    <textarea id="pTreatment" placeholder="اكتب علاج الموصوف والجرعات بالتفصيل..."></textarea>
                </div>

                <div class="form-control">
                    <label>توصيات طبية وموعد المراجعة:</label>
                    <input type="text" id="pNotes" placeholder="مثال: مراجعة بعد أسبوعين / راحة طبية">
                </div>

                <div class="form-control">
                    <label>اسم الطبيب المعالج:</label>
                    <input type="text" id="pDoctor" placeholder="اسم الطبيب أو الأخصائي">
                </div>

                <div class="actions-bar">
                    <button class="btn-save" onclick="saveData()">حفظ في المنظومة</button>
                </div>
            </div>

            <div class="footer-nav">
                <a href="records.html">📁 سجل الحالات</a>
                <a href="index.html" style="color: #dc2626;">🚪 خروج</a>
            </div>
        </div>
    </div>

    <script>
        const S_URL = 'https://kqauubmsyrvsqtcqjfch.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYXV1Ym1zeXJ2c3F0Y3FqZmNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NDI3NDMsImV4cCI6MjA5MzUxODc0M30.jDJb85oG4PZlwo7hwzsNtBbn9TqjQDxjPedxu4wApCc';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        function toggleType() {
            const type = document.querySelector('input[name="pType"]:checked').value;
            const milFields = document.querySelectorAll('.military-fields');
            const addrDiv = document.getElementById('addrDiv');
            
            if (type === 'عسكري') {
                milFields.forEach(el => el.style.display = 'flex');
                addrDiv.style.display = 'none';
            } else {
                milFields.forEach(el => el.style.display = 'none');
                addrDiv.style.display = 'flex';
            }
        }

        async function saveData() {
            const pCode = document.getElementById('pCode').value;
            const pAge = document.getElementById('pAge').value;
            const pPhone = document.getElementById('pPhone').value;
            const pType = document.querySelector('input[name="pType"]:checked').value;
            const pUnit = document.getElementById('pUnit').value;
            const pAddr = document.getElementById('pAddr').value;
            const pDiag = document.getElementById('pDiag').value;
            const pTreatment = document.getElementById('pTreatment').value;
            const pNotes = document.getElementById('pNotes').value;
            
            const pAdminStatus = document.getElementById('pAdminStatus').value;
            const pRiskLevel = document.getElementById('pRiskLevel').value;
            const pTrauma = document.getElementById('pTrauma').value;
            const pPastMedical = document.getElementById('pPastMedical').value;
            const pFamilyHistory = document.getElementById('pFamilyHistory').value;
            const pDoctor = document.getElementById('pDoctor').value;

            if(!pCode) { alert("من فضلك أدخل كود المريض أو الاسم أولاً"); return; }

            const { error } = await _supabase.from('psychiatry_patients').insert([{
                patient_code: pCode,
                diagnosis: pDiag,
                age: pAge ? parseInt(pAge) : null,
                phone: pPhone,
                type: pType,
                unit: pType === 'عسكري' ? pUnit : null,
                addr: pType === 'مدني' ? pAddr : null,
                treatment: pTreatment,
                notes: pNotes,
                administrative_status: pType === 'عسكري' ? pAdminStatus : null,
                risk_level: pRiskLevel,
                trauma_history: pTrauma,
                past_medical_history: pPastMedical,
                family_history: pFamilyHistory,
                doctor_name: pDoctor
            }]);

            if (error) {
                alert("حدث خطأ أثناء الحفظ بالسيرفر: " + error.message);
            } else {
                document.getElementById('msg').innerText = "تم حفظ المريض بنجاح: " + pCode;
                document.getElementById('successModal').style.display = 'flex';
            }
        }
        
        function closeM() { document.getElementById('successModal').style.display='none'; location.reload(); }
    </script>
</body>
</html>
