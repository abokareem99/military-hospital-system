<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل مريض - مستشفى السلاح الطبي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --deep-blue: #0f172a;
            --medical-green: #14532d;
            --soft-bg: #f8fafc;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #020617 0%, #1e293b 100%);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 500px;
            background: #ffffff;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border-top: 8px solid var(--gold);
        }

        /* الترويسة وبها صقر الجديان بالمقاس المطلوب */
        .header {
            background: var(--deep-blue);
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 3px solid var(--gold);
        }

        .sudan-logo {
            width: 95px; /* المقاس المعتمد */
            height: auto;
            filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.4));
        }

        .header-text h1 {
            margin: 0;
            font-size: 18px;
            color: var(--gold);
            font-weight: 900;
        }

        .header-text h2 {
            margin: 5px 0 0;
            font-size: 14px;
            color: #ffffff;
            opacity: 0.9;
        }

        .form-body {
            padding: 30px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--deep-blue);
            font-size: 14px;
        }

        /* تنسيق الحقول كما في الصورة */
        input, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: 'Cairo';
            font-size: 15px;
            background: var(--soft-bg);
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--medical-green);
            background: #ffffff;
            outline: none;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            background: #f1f5f9;
            padding: 12px;
            border-radius: 12px;
        }

        .btn-save {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, var(--medical-green), #166534);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(20, 83, 45, 0.2);
            transition: 0.3s;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(20, 83, 45, 0.3);
        }

        .footer-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .footer-nav a {
            text-decoration: none;
            color: #64748b;
            font-size: 13px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/Emblem_of_Sudan.svg/1000px-Emblem_of_Sudan.svg.png" class="sudan-logo" alt="صقر الجديان">
            <div class="header-text">
                <h1>مستشفى السلاح الطبي - بورتسودان</h1>
                <h2>قسم الصحة النفسية | المنظومة الرقمية</h2>
            </div>
        </div>

        <div class="form-body">
            <label>نوع المريض:</label>
            <div class="radio-group">
                <label style="margin:0"><input type="radio" name="pType" value="عسكري" checked> عسكري</label>
                <label style="margin:0"><input type="radio" name="pType" value="مدني"> مدني</label>
            </div>

            <label>كود المريض / الاسم:</label>
            <input type="text" id="pCode" placeholder="مثال: صالح ج ك / 45">

            <label>رقم الهاتف:</label>
            <input type="tel" id="pPhone" placeholder="0XXXXXXXXX">

            <label>الحالة التشخيصية:</label>
            <select id="pDiag">
                <option>قلق عام</option>
                <option>إكتئاب</option>
                <option>اضطراب ثنائي القطب</option>
                <option>فصام</option>
            </select>

            <button class="btn-save" id="saveBtn" onclick="saveData()">حفظ في السحابة</button>

            <div class="footer-nav">
                <a href="records.html">📁 سجل الحالات</a>
                <a href="index.html" style="color:#ef4444;">🚪 خروج</a>
            </div>
        </div>
    </div>

    <script>
        // إعدادات الربط مع Supabase
        const S_URL = 'https://kqauubmsyrvsqtcqjfch.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYXV1Ym1zeXJ2c3F0Y3FqZmNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NDI3NDMsImV4cCI6MjA5MzUxODc0M30.jDJb85oG4PZlwo7hwzsNtBbn9TqjQDxjPedxu4wApCc';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        async function saveData() {
            const code = document.getElementById('pCode').value;
            if(!code) { alert("يرجى إدخال كود المريض"); return; }

            const btn = document.getElementById('saveBtn');
            btn.innerText = "جاري المزامنة...";
            btn.disabled = true;

            try {
                const { error } = await _supabase.from('psychiatry_patients').insert([{ 
                    patient_code: code,
                    patient_type: document.querySelector('input[name="pType"]:checked').value,
                    phone: document.getElementById('pPhone').value,
                    diagnosis: document.getElementById('pDiag').value,
                    notes: "تسجيل جديد"
                }]);

                if (error) throw error;
                alert("تم الحفظ بنجاح في قاعدة البيانات");
                location.reload();

            } catch (err) {
                alert("فشل في الحفظ: " + err.message);
                btn.innerText = "حفظ في السحابة";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
