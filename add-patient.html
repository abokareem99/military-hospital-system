<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل مريض - مستشفى السلاح الطبي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --gold-dark: #b8860b; --deep-blue: #0f172a; }
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #020617 0%, #1e293b 100%); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px 0; }
        .container { width: 95%; max-width: 500px; background: #fff; border-radius: 25px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.5); border-top: 10px solid var(--gold); position: relative; }
        .header { background: #1e293b; padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); }
        .logo-img { width: 80px; margin-bottom: 10px; }
        .header h1 { margin: 0; font-size: 18px; color: var(--gold); }
        .header h2 { margin: 5px 0 0; font-size: 15px; color: #fff; }
        .form-body { padding: 25px; }
        label { display: block; margin-bottom: 5px; color: #1e293b; font-weight: 700; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; box-sizing: border-box; font-family: 'Cairo'; margin-bottom: 15px; background: #f8fafc; font-size: 14px; }
        .radio-group { display: flex; gap: 20px; margin-bottom: 15px; background: #f1f5f9; padding: 10px; border-radius: 12px; }
        .btn-save { width: 100%; padding: 15px; background: linear-gradient(90deg, var(--gold-dark), var(--gold)); color: #000; border: none; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; }
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(5px); }
        .modal-box { background: white; padding: 30px; border-radius: 20px; width: 80%; text-align: center; border: 2px solid var(--gold); }
        .footer-nav { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; }
        .footer-nav a { text-decoration: none; color: #64748b; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div id="customModal" class="modal-overlay">
            <div class="modal-box">
                <h3 style="color: var(--gold-dark);">✅ تم الحفظ بنجاح</h3>
                <p id="modalMsg"></p>
                <button style="background:var(--deep-blue); color:#fff; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;" onclick="closeModal()">موافق</button>
            </div>
        </div>
        <div class="header">
            <img src="icon-192.png" alt="شعار" class="logo-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3063/3063176.png'">
            <h1>مستشفى السلاح الطبي ببورتسودان</h1>
            <h2>قسم النفسية</h2>
        </div>
        <div class="form-body">
            <label>نوع المريض:</label>
            <div class="radio-group">
                <label><input type="radio" name="pType" value="عسكري" checked onclick="toggleType()"> عسكري</label>
                <label><input type="radio" name="pType" value="مدني" onclick="toggleType()"> مدني</label>
            </div>
            <label>كود المريض / الاسم:</label>
            <input type="text" id="pCode" placeholder="أدخل الكود أو الاسم">
            <label>رقم الهاتف:</label>
            <input type="tel" id="pPhone" placeholder="0XXXXXXXXX">
            <div id="unitDiv">
                <label>الوحدة العسكرية:</label>
                <input type="text" id="pUnit" placeholder="اسم الوحدة">
            </div>
            <div id="addrDiv" style="display:none;">
                <label>العنوان:</label>
                <input type="text" id="pAddr" placeholder="السكن / الحي">
            </div>
            <label>الحالة التشخيصية:</label>
            <select id="pDiag">
                <option>قلق عام</option><option>إكتئاب</option><option>اضطراب ثنائي القطب</option><option>فصام</option><option>اضطراب ما بعد الصدمة</option><option>أخرى</option>
            </select>
            <button class="btn-save" onclick="saveData()">حفظ في المنظومة</button>
            <div class="footer-nav">
                <a href="records.html">📁 سجل الحالات</a>
                <a href="index.html" style="color: #dc2626;">🚪 خروج</a>
            </div>
        </div>
    </div>
    <script>
        function toggleType() {
            const type = document.querySelector('input[name="pType"]:checked').value;
            document.getElementById('unitDiv').style.display = type === 'عسكري' ? 'block' : 'none';
            document.getElementById('addrDiv').style.display = type === 'مدني' ? 'block' : 'none';
        }
        function saveData() {
            const data = {
                type: document.querySelector('input[name="pType"]:checked').value,
                code: document.getElementById('pCode').value,
                phone: document.getElementById('pPhone').value,
                unit: document.getElementById('pUnit').value,
                addr: document.getElementById('pAddr').value,
                diag: document.getElementById('pDiag').value,
                date: new Date().toLocaleDateString('ar-EG')
            };
            if(!data.code) { alert("يجب إدخال الكود"); return; }
            let list = JSON.parse(localStorage.getItem('patients')) || [];
            list.push(data);
            localStorage.setItem('patients', JSON.stringify(list));
            document.getElementById('modalMsg').innerText = "تم تسجيل المريض " + data.code;
            document.getElementById('customModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('customModal').style.display = 'none'; location.reload(); }
    </script>
</body>
</html>
