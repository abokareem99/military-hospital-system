<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل مريض - نظام المتابعة الرقمي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --deep-blue: #0f172a; --medical-green: #14532d; }
        body { font-family: 'Cairo', sans-serif; background: #020617; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { width: 95%; max-width: 480px; background: #fff; border-radius: 25px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .header { background: var(--deep-blue); padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--gold); }
        .header-text { text-align: right; }
        .header-text h3 { margin: 0; color: #fff; font-size: 13px; opacity: 0.8; font-weight: 400; }
        .header-text h1 { margin: 4px 0; color: var(--gold); font-size: 19px; font-weight: 900; }
        .header-text h2 { margin: 0; color: #fff; font-size: 14px; }
        .sudan-logo { width: 75px; height: auto; }
        .form-body { padding: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--deep-blue); font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 18px; border: 2px solid #e2e8f0; border-radius: 10px; font-family: 'Cairo'; box-sizing: border-box; }
        .radio-group { display: flex; gap: 20px; margin-bottom: 18px; background: #f8fafc; padding: 10px; border-radius: 10px; }
        .btn-save { width: 100%; padding: 15px; background: var(--medical-green); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 800; cursor: pointer; }
        .footer-nav { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; }
        .footer-nav a { text-decoration: none; color: #64748b; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-text">
                <h3>منطقة البحر الأحمر العسكرية</h3>
                <h1>مستشفى السلاح الطبي</h1>
                <h2>نظام المتابعة الرقمي</h2>
            </div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/Emblem_of_Sudan.svg/1000px-Emblem_of_Sudan.svg.png" class="sudan-logo" alt="صقر الجديان">
        </div>
        <div class="form-body">
            <label>نوع المريض:</label>
            <div class="radio-group">
                <label><input type="radio" name="pType" value="عسكري" checked> عسكري</label>
                <label><input type="radio" name="pType" value="مدني"> مدني</label>
            </div>
            <label>كود المريض / الاسم:</label>
            <input type="text" id="pCode" placeholder="مثال: صالح ج ك / 45">
            <label>رقم الهاتف:</label>
            <input type="tel" id="pPhone" placeholder="0XXXXXXXXX">
            <label>الحالة التشخيصية:</label>
            <select id="pDiag">
                <option>قلق عام</option>
                <option>إكتئاب</option>
                <option>اضطراب ثنائي القطب</option>
                <option>فصام</option>
            </select>
            <button class="btn-save" id="saveBtn" onclick="saveData()">حفظ في السحابة</button>
            <div class="footer-nav">
                <a href="records.html">📁 سجل الحالات</a>
                <a href="index.html" style="color:#ef4444;">🚪 خروج</a>
            </div>
        </div>
    </div>
    <script>
        const S_URL = 'https://kqauubmsyrvsqtcqjfch.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYXV1Ym1zeXJ2c3F0Y3FqZmNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NDI3NDMsImV4cCI6MjA5MzUxODc0M30.jDJb85oG4PZlwo7hwzsNtBbn9TqjQDxjPedxu4wApCc';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        async function saveData() {
            const code = document.getElementById('pCode').value;
            if(!code) { alert("يرجى إدخال كود المريض"); return; }
            const btn = document.getElementById('saveBtn');
            btn.innerText = "جاري الحفظ...";
            btn.disabled = true;
            try {
                const { error } = await _supabase.from('psychiatry_patients').insert([{ 
                    patient_code: code,
                    patient_type: document.querySelector('input[name="pType"]:checked').value,
                    phone: document.getElementById('pPhone').value,
                    diagnosis: document.getElementById('pDiag').value
                }]);
                if (error) throw error;
                alert("تم الحفظ بنجاح");
                location.reload();
            } catch (err) {
                alert("خطأ: " + err.message);
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
