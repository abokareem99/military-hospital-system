<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة حالة - السلاح الطبي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; margin: 0; padding: 20px; }
        .card { max-width: 500px; margin: auto; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; }
        .card-header { background: #1e3a8a; color: white; padding: 20px; text-align: center; }
        .card-body { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; color: #1e293b; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-family: 'Cairo'; font-size: 15px; outline: none; transition: 0.3s; }
        input:focus, select:focus, textarea:focus { border-color: #1e3a8a; }
        .btn-save { width: 100%; padding: 15px; background: #1e3a8a; color: white; border: none; border-radius: 10px; font-size: 17px; font-weight: bold; cursor: pointer; }
        .btn-save:disabled { background: #94a3b8; }
        .nav-links { display: flex; justify-content: space-around; margin-top: 25px; border-top: 1px solid #f1f5f9; padding-top: 15px; }
        .nav-links a { text-decoration: none; color: #64748b; font-size: 14px; font-weight: bold; }
        #statusMsg { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <h2 style="margin:0">تسجيل حالة جديدة</h2>
        <small>قسم الطب النفسي - السلاح الطبي</small>
    </div>
    <div class="card-body">
        <div class="form-group">
            <label>كود المريض (العسكري/المدني):</label>
            <input type="text" id="p_code" placeholder="مثلاً: PSY-1002">
        </div>
        <div class="form-group">
            <label>نوع التشخيص:</label>
            <select id="p_diagnosis">
                <option value="اكتئاب">اكتئاب</option>
                <option value="قلق حاد">قلق حاد</option>
                <option value="اضطراب صدمة">اضطراب ما بعد الصدمة</option>
                <option value="فصام">فصام</option>
                <option value="أخرى">أخرى</option>
            </select>
        </div>
        <div class="form-group">
            <label>ملاحظات الطبيب:</label>
            <textarea id="p_notes" rows="4"></textarea>
        </div>
        <button class="btn-save" id="saveBtn">حفظ في المنظومة الآمنة</button>
        <div id="statusMsg"></div>
        <div class="nav-links">
            <a href="view-patients.html">📋 عرض السجلات</a>
            <a href="index.html">🚪 تسجيل الخروج</a>
        </div>
    </div>
</div>

<script>
    const S_URL = 'https://kqauubmsyrvsqtcqjfch.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYXV1Ym1zeXJ2c3F0Y3FqZmNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NDI3NDMsImV4cCI6MjA5MzUxODc0M30.jDJb85oG4PZlwo7hwzsNtBbn9TqjQDxjPedxu4wApCc';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    document.getElementById('saveBtn').addEventListener('click', async () => {
        const code = document.getElementById('p_code').value.trim();
        const diagnosis = document.getElementById('p_diagnosis').value;
        const notes = document.getElementById('p_notes').value;
        const msg = document.getElementById('statusMsg');

        if(!code) { alert("يرجى إدخال كود المريض"); return; }

        if(!confirm("هل تريد تأكيد حفظ هذه الحالة في السجل الرسمي؟")) return;

        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.innerText = "جاري التشفير والحفظ...";

        const { error } = await _supabase.from('hospital_patients').insert([{ patient_code: code, diagnosis: diagnosis, notes: notes }]);

        if (!error) {
            msg.innerHTML = "<span style='color:green'>✅ تمت المزامنة بنجاح</span>";
            document.getElementById('p_code').value = '';
            document.getElementById('p_notes').value = '';
        } else {
            msg.innerHTML = "<span style='color:red'>❌ خطأ في الاتصال بالسيرفر</span>";
        }
        btn.disabled = false;
        btn.innerText = "حفظ في المنظومة الآمنة";
    });
</script>
</body>
</html>
