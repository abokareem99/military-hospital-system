<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل مريض - مستشفى السلاح الطبي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-dark: #b8860b; 
            --deep-blue: #0f172a; 
            --medical-green: #14532d; 
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #020617 0%, #1e293b 100%); 
            margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; 
        }

        .container { 
            width: 95%; max-width: 500px; background: #fff; border-radius: 25px; 
            overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.5); 
            border-top: 8px solid var(--gold); margin: 20px auto;
        }

        .header { 
            background: #1e293b; padding: 20px; display: flex; align-items: center; justify-content: space-between; 
            border-bottom: 2px solid var(--gold);
        }

        .header-text { text-align: right; }
        .logo-img { width: 70px; height: auto; filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.3)); }
        .header h1 { margin: 0; font-size: 17px; color: var(--gold); font-weight: 800; }
        .header h2 { margin: 3px 0 0; font-size: 14px; color: #fff; }

        .badge-system { 
            display: inline-block; background: var(--gold); color: #000; padding: 3px 12px; 
            border-radius: 20px; font-size: 11px; font-weight: bold; margin-top: 8px; 
        }

        .form-body { padding: 25px; }
        label { display: block; margin-bottom: 5px; color: #1e293b; font-weight: 700; font-size: 14px; }
        
        input[type="text"], input[type="tel"], select { 
            width: 100%; padding: 14px; 
            border: 2px solid var(--medical-green); 
            border-radius: 12px; box-sizing: border-box; font-family: 'Cairo'; 
            margin-bottom: 18px; 
            background: var(--medical-green) !important; 
            color: #ffffff !important; 
            font-size: 15px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
            transition: 0.3s ease;
        }

        input::placeholder { color: rgba(255,255,255,0.6); }

        input:focus, select:focus { 
            border-color: var(--gold); 
            background: #166534 !important; 
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
            outline: none;
        }

        .radio-group { 
            display: flex; gap: 20px; margin-bottom: 18px; 
            background: #f1f5f9; padding: 12px; border-radius: 12px; 
        }

        .btn-save { 
            width: 100%; padding: 16px; 
            background: linear-gradient(90deg, var(--gold-dark), var(--gold)); 
            color: #000; border: none; border-radius: 12px; font-size: 17px; 
            font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        .btn-save:disabled { background: #94a3b8; cursor: not-allowed; }

        .footer-nav { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; }
        .footer-nav a { text-decoration: none; color: #64748b; font-size: 13px; font-weight: bold; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: white; padding: 25px; border-radius: 15px; text-align: center; border: 3px solid var(--gold); }
    </style>
</head>
<body>
    <div id="successModal" class="modal-overlay">
        <div class="modal-box">
            <h2 style="color: var(--medical-green)">✅ تم الحفظ سحابياً</h2>
            <p id="msg"></p>
            <button onclick="closeM()" style="background:var(--deep-blue); color:white; padding:10px 20px; border:none; border-radius:8px; cursor:pointer;">موافق</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <div class="header-text">
                <h1>مستشفى السلاح الطبي ببورتسودان</h1>
                <h2>قسم النفسية</h2>
                <div class="badge-system">نظام المتابعة الرقمي</div>
            </div>
            <img src="icon-192.png" alt="شعار" class="logo-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3063/3063176.png'">
        </div>

        <div class="form-body">
            <label>نوع المريض:</label>
            <div class="radio-group">
                <label><input type="radio" name="pType" value="عسكري" checked onclick="toggleType()"> عسكري</label>
                <label><input type="radio" name="pType" value="مدني" onclick="toggleType()"> مدني</label>
            </div>

            <label>كود المريض / الاسم:</label>
            <input type="text" id="pCode" placeholder="أدخل الكود أو الاسم">

            <label>رقم الهاتف:</label>
            <input type="tel" id="pPhone" placeholder="0XXXXXXXXX">

            <div id="unitDiv">
                <label>الوحدة العسكرية:</label>
                <input type="text" id="pUnit" placeholder="اسم الوحدة">
            </div>

            <div id="addrDiv" style="display:none;">
                <label>العنوان:</label>
                <input type="text" id="pAddr" placeholder="السكن / الحي">
            </div>

            <label>الحالة التشخيصية:</label>
            <select id="pDiag">
                <option>قلق عام</option><option>إكتئاب</option><option>اضطراب ثنائي القطب</option>
                <option>فصام</option><option>اضطراب ما بعد الصدمة</option><option>أخرى</option>
            </select>

            <button class="btn-save" id="saveBtn" onclick="saveData()">حفظ في المنظومة السحابية</button>

            <div class="footer-nav">
                <a href="records.html">📁 سجل الحالات</a>
                <a href="index.html" style="color: #dc2626;">🚪 خروج</a>
            </div>
        </div>
    </div>

    <script>
        // إعدادات Supabase
        const S_URL = 'https://kqauubmsyrvsqtcqjfch.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYXV1Ym1zeXJ2c3F0Y3FqZmNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NDI3NDMsImV4cCI6MjA5MzUxODc0M30.jDJb85oG4PZlwo7hwzsNtBbn9TqjQDxjPedxu4wApCc';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        function toggleType() {
            const type = document.querySelector('input[name="pType"]:checked').value;
            document.getElementById('unitDiv').style.display = type === 'عسكري' ? 'block' : 'none';
            document.getElementById('addrDiv').style.display = type === 'مدني' ? 'block' : 'none';
        }

        async function saveData() {
            const type = document.querySelector('input[name="pType"]:checked').value;
            const code = document.getElementById('pCode').value;
            const phone = document.getElementById('pPhone').value;
            const unit = document.getElementById('pUnit').value;
            const addr = document.getElementById('pAddr').value;
            const diag = document.getElementById('pDiag').value;

            if(!code) { alert("أدخل اسم أو كود المريض"); return; }

            const btn = document.getElementById('saveBtn');
            btn.innerText = "جاري الحفظ...";
            btn.disabled = true;

            // الحفظ في Supabase
            const { data, error } = await _supabase
                .from('psychiatry_patients')
                .insert([
                    { 
                        patient_code: code, 
                        patient_type: type, 
                        phone: phone, 
                        unit: type === 'عسكري' ? unit : null, 
                        address: type === 'مدني' ? addr : null, 
                        diagnosis: diag 
                    }
                ]);

            if (error) {
                console.error("خطأ:", error);
                alert("حدث خطأ: " + error.message);
                btn.innerText = "حفظ في المنظومة السحابية";
                btn.disabled = false;
            } else {
                document.getElementById('msg').innerText = "تم تسجيل المريض " + code + " بنجاح في قاعدة البيانات السحابية.";
                document.getElementById('successModal').style.display = 'flex';
            }
        }

        function closeM() { 
            document.getElementById('successModal').style.display='none'; 
            window.location.href = 'records.html'; // الانتقال للسجل لرؤية النتيجة
        }
    </script>
</body>
</html>
