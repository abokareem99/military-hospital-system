<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل مريض - مستشفى السلاح الطبي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-dark: #b8860b;
            --deep-blue: #0f172a;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #020617 0%, #1e293b 100%); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }

        .container { 
            width: 90%; 
            max-width: 480px; 
            background: #ffffff; 
            border-radius: 25px; 
            overflow: hidden; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border-top: 10px solid var(--gold);
        }

        .header { 
            background: #1e293b; 
            padding: 25px; 
            text-align: center; 
            border-bottom: 2px solid var(--gold);
        }

        .header h1 { 
            margin: 0; 
            font-size: 20px; 
            color: var(--gold); 
            font-weight: 800; 
        }

        .header h2 { 
            margin: 5px 0 0; 
            font-size: 16px; 
            color: #fff; 
            opacity: 0.9;
        }

        .badge-system {
            display: inline-block;
            background: var(--gold);
            color: #000;
            padding: 4px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 10px;
        }

        .form-body { padding: 30px; }

        label { 
            display: block; 
            margin-bottom: 10px; 
            color: #1e293b; 
            font-weight: 700; 
            font-size: 15px; 
        }

        input, select, textarea { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #f1f5f9; 
            border-radius: 15px; 
            box-sizing: border-box; 
            font-family: 'Cairo'; 
            font-size: 16px; 
            background: #f8fafc;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        input:focus, select:focus, textarea:focus { 
            border-color: var(--gold); 
            outline: none; 
            background: #fff;
        }

        .btn-save { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(90deg, var(--gold-dark), var(--gold)); 
            color: #000; 
            border: none; 
            border-radius: 15px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .btn-save:hover { 
            transform: translateY(-2px); 
            filter: brightness(1.1);
        }

        .footer-nav { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 25px; 
            padding-top: 15px; 
            border-top: 1px solid #eee; 
        }

        .footer-nav a { 
            text-decoration: none; 
            color: #64748b; 
            font-size: 14px; 
            font-weight: bold; 
        }

        .footer-nav a:hover { color: var(--gold-dark); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>مستشفى السلاح الطبي ببورتسودان</h1>
        <h2>قسم النفسية</h2>
        <div class="badge-system">نظام المتابعة الرقمي</div>
    </div>

    <div class="form-body">
        <label>كود المريض:</label>
        <input type="text" placeholder="أدخل الكود الرقمي">

        <label>الحالة التشخيصية:</label>
        <select>
            <option disabled selected>اختر التشخيص...</option>
            <option>إكتئاب</option>
            <option>قلق</option>
            <option>اضطراب سلوكي</option>
            <option>أخرى</option>
        </select>

        <label>ملاحظات الطبيب:</label>
        <textarea rows="3" placeholder="أضف ملاحظاتك هنا"></textarea>

        <button class="btn-save">حفظ في المنظومة الآمنة</button>

        <div class="footer-nav">
            <a href="records.html">📁 سجل الحالات</a>
            <a href="index.html" style="color: #dc2626;">🚪 خروج</a>
        </div>
    </div>
</div>

</body>
</html>
