<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول - نظام المتابعة الرقمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0f172a; }
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #020617 0%, #1e293b 100%); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { width: 90%; max-width: 400px; background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-top: 6px solid var(--gold); text-align: center; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; text-align: right; }
        .logo-sm { width: 60px; height: auto; }
        h4 { margin: 0; color: #64748b; font-size: 12px; }
        h1 { margin: 5px 0; font-size: 18px; color: var(--dark); }
        .badge { background: var(--dark); color: var(--gold); padding: 8px 15px; border-radius: 50px; font-weight: bold; font-size: 13px; display: inline-block; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; text-align: center; box-sizing: border-box; font-family: 'Cairo'; }
        button { width: 100%; padding: 14px; background: var(--dark); color: var(--gold); border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        #errorMsg { color: #dc2626; font-size: 13px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="header-flex">
            <div>
                <h4>منطقة البحر الأحمر العسكرية</h4>
                <h1>مستشفى السلاح الطبي</h1>
            </div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/Emblem_of_Sudan.svg/1000px-Emblem_of_Sudan.svg.png" class="logo-sm" alt="Logo">
        </div>
        <div class="badge">نظام المتابعة الرقمي</div>
        <input type="password" id="passInput" placeholder="أدخل كلمة المرور">
        <button onclick="checkPass()">دخول للمنظومة</button>
        <p id="errorMsg">⚠️ كلمة المرور غير صحيحة</p>
    </div>
    <script>
        function checkPass() {
            if (document.getElementById('passInput').value === "Suha2026") {
                window.location.href = "add-patient.html";
            } else {
                document.getElementById('errorMsg').style.display = "block";
            }
        }
    </script>
</body>
</html>
