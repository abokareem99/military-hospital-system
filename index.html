<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول - منظومة السلاح الطبي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* تحسينات الواجهة العامة */
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #f1f5f9; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        /* تكبير الحاوية الرئيسية */
        .container { 
            max-width: 500px; 
            width: 90%; 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            border-top: 10px solid #1e3a8a; 
            text-align: center; 
        }

        /* تحسين حجم الشعار والعناوين */
        .logo { width: 110px; height: auto; margin-bottom: 20px; }
        h2 { color: #1e3a8a; margin: 15px 0; font-size: 26px; font-weight: 700; }
        
        .status-bar { 
            background: #e2e8f0; 
            padding: 12px; 
            border-radius: 30px; 
            font-size: 14px; 
            color: #1e3a8a; 
            margin-bottom: 35px; 
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* تكبير خانة الإدخال والزر */
        input { 
            width: 100%; 
            padding: 18px; 
            margin-bottom: 20px; 
            border: 2px solid #d1d5db; 
            border-radius: 12px; 
            font-size: 20px; 
            text-align: center; 
            font-family: 'Cairo'; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.3s;
        }
        input:focus { border-color: #1e3a8a; background-color: #f8fafc; }

        button { 
            width: 100%; 
            padding: 18px; 
            background: #1e3a8a; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 20px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            box-shadow: 0 4px 6px rgba(30, 58, 138, 0.2);
        }
        button:hover { background: #1e40af; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(30, 58, 138, 0.3); }

        /* تذييل الصفحة */
        .footer { 
            margin-top: 40px; 
            font-size: 15px; 
            color: #1e3a8a; 
            font-weight: bold; 
            border-top: 2px solid #f1f5f9; 
            padding-top: 20px; 
        }

        #errorMsg { 
            color: #dc2626; 
            font-size: 16px; 
            margin-top: 15px; 
            display: none; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" class="logo" alt="شعار السلاح الطبي">
    <h2>منظومة المكتب التقني</h2>
    <div class="status-bar">المستشفى العسكري - قسم النفسية (بورتسودان)</div>

    <input type="password" id="passInput" placeholder="أدخل كلمة المرور">
    <button onclick="checkPass()">دخول للمنظومة</button>
    
    <p id="errorMsg">⚠️ كلمة المرور غير صحيحة!</p>

    <div class="footer">
        تمت البرمجة والتأمين باسم suha
    </div>
</div>

<script>
    function checkPass() {
        const pass = document.getElementById('passInput').value;
        const error = document.getElementById('errorMsg');
        
        // كلمة المرور الجديدة المطلوبة
        if (pass === "Suha2026") {
            window.location.href = "add-patient.html";
        } else {
            error.style.display = "block";
            document.getElementById('passInput').value = "";
            document.getElementById('passInput').focus();
        }
    }

    // دعم زر Enter من لوحة المفاتيح
    document.getElementById('passInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkPass();
    });
</script>

</body>
</html>
