<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستشفى السلاح الطبي | بورتسودان</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0f172a; /* لون كحلي عسكري */
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
        }
        .main-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-top: 10px solid #1e3a8a;
        }
        .logo {
            width: 120px;
            margin-bottom: 20px;
        }
        h1 {
            color: #1e3a8a;
            font-size: 22px;
            margin: 10px 0;
        }
        h2 {
            color: #64748b;
            font-size: 18px;
            font-weight: normal;
            margin-bottom: 30px;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: block;
            padding: 15px;
            text-decoration: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-add {
            background-color: #1e3a8a;
            color: white;
        }
        .btn-add:hover {
            background-color: #1e40af;
        }
        .btn-view {
            background-color: #f1f5f9;
            color: #1e3a8a;
            border: 2px solid #1e3a8a;
        }
        .btn-view:hover {
            background-color: #e2e8f0;
        }
        .footer-text {
            margin-top: 30px;
            color: #94a3b8;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Emblem_of_Sudan.svg/500px-Emblem_of_Sudan.svg.png" 
             alt="شعار السودان" class="logo">
        
        <h1>مستشفى السلاح الطبي بورتسودان</h1>
        <h2>نظام إدارة سجلات قسم النفسية</h2>

        <div class="btn-container">
            <a href="add-patient.html" class="btn btn-add">➕ تسجيل حالة جديدة</a>
            
            <a href="view-patients.html" class="btn btn-view">📋 عرض سجل الحالات</a>
        </div>

        <p class="footer-text">النظام الرقمي الموحد - المكتب التقني</p>
    </div>

</body>
</html>
