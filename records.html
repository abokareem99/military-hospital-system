<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الحالات - مستشفى السلاح الطبي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --gold-dark: #b8860b; --deep-blue: #0f172a; }
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 1200px; margin: auto; background: #fff; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--gold); overflow: hidden; }
        .header { background: var(--deep-blue); color: var(--gold); padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .table-container { padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: #f8fafc; padding: 15px; text-align: right; border-bottom: 2px solid var(--gold); color: var(--deep-blue); }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .actions button { border: none; background: none; cursor: pointer; font-size: 18px; margin: 0 5px; }
        .btn-edit { color: #2563eb; }
        .btn-print { color: var(--gold-dark); }
        .btn-delete { color: #dc2626; }

        /* نافذة التعديل */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; border-top: 5px solid var(--gold); }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-family: 'Cairo'; }
        .modal-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn-update { background: var(--deep-blue); color: white; flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-close { background: #ccc; flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>✏️ تعديل بيانات المريض</h3>
        <input type="hidden" id="editId">
        <label>التشخيص:</label>
        <select id="editDiag">
            <option>قلق عام</option><option>إكتئاب</option><option>اضطراب ثنائي القطب</option>
            <option>فصام</option><option>اضطراب ما بعد الصدمة</option><option>أخرى</option>
        </select>
        <label>الملاحظات:</label>
        <input type="text" id="editNotes">
        <div class="modal-btns">
            <button class="btn-update" onclick="updateRecord()">حفظ التعديلات</button>
            <button class="btn-close" onclick="closeModal()">إلغاء</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="header">
        <h1>📁 سجل متابعة الحالات الرقمي</h1>
        <div id="statsCount"></div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>الكود</th>
                    <th>التشخيص</th>
                    <th>الهاتف</th>
                    <th>الملاحظات</th>
                    <th>إجراءات</th>
                </tr>
            </thead>
            <tbody id="recordsList"></tbody>
        </table>
    </div>
</div>

<script>
    const S_URL = 'https://kqauubmsyrvsqtcqjfch.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYXV1Ym1zeXJ2c3F0Y3FqZmNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NDI3NDMsImV4cCI6MjA5MzUxODc0M30.jDJb85oG4PZlwo7hwzsNtBbn9TqjQDxjPedxu4wApCc';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    async function loadRecords() {
        const { data, error } = await _supabase.from('psychiatry_patients').select('*').order('created_at', { ascending: false });
        if (error) return;
        const table = document.getElementById('recordsList');
        table.innerHTML = data.map(p => `
            <tr>
                <td><b>${p.patient_code}</b></td>
                <td>${p.diagnosis}</td>
                <td>${p.phone || '-'}</td>
                <td>${p.notes || '-'}</td>
                <td class="actions">
                    <button class="btn-edit" onclick='openEditModal(${JSON.stringify(p).replace(/'/g, "&apos;")})'>✏️</button>
                    <button class="btn-print" onclick='alert("جاري التحضير للطباعة...")'>🖨️</button>
                    <button class="btn-delete" onclick="deleteRecord('${p.id}')">🗑️</button>
                </td>
            </tr>
        `).join('');
    }

    function openEditModal(p) {
        document.getElementById('editId').value = p.id;
        document.getElementById('editDiag').value = p.diagnosis;
        document.getElementById('editNotes').value = p.notes || "";
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('editModal').style.display = 'none'; }

    async function updateRecord() {
        const id = document.getElementById('editId').value;
        const diag = document.getElementById('editDiag').value;
        const notes = document.getElementById('editNotes').value;

        const { error } = await _supabase
            .from('psychiatry_patients')
            .update({ diagnosis: diag, notes: notes })
            .eq('id', id);

        if (!error) {
            closeModal();
            loadRecords();
        } else {
            alert("حدث خطأ أثناء التحديث");
        }
    }

    async function deleteRecord(id) {
        if(confirm("هل أنت متأكد من الحذف؟")) {
            await _supabase.from('psychiatry_patients').delete().eq('id', id);
            loadRecords();
        }
    }

    window.onload = loadRecords;
</script>
</body>
</html>
