<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فحص مطابقة الأسماء - السلاح الطبي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .debug-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; border-right: 5px solid #d4af37; text-align: right; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        .status { padding: 10px; margin-bottom: 10px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="color: #0f172a;">فحص الاتصال ومطابقة الأسماء 🔍</h2>
    <div id="connectionStatus" class="status" style="background: #eee;">جاري الاتصال بالقاعدة...</div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr id="tableHeader">
                    </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="10">في انتظار البيانات...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const S_URL = 'https://kqauubmsyrvsqtcqjfch.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYXV1Ym1zeXJ2c3F0Y3FqZmNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NDI3NDMsImV4cCI6MjA5MzUxODc0M30.jDJb85oG4PZlwo7hwzsNtBbn9TqjQDxjPedxu4wApCc';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        async function checkData() {
            const statusDiv = document.getElementById('connectionStatus');
            
            try {
                // جلب البيانات من الجدول
                const { data, error } = await _supabase.from('psychiatry_patients').select('*').limit(5);

                if (error) {
                    statusDiv.style.background = "#fee2e2";
                    statusDiv.style.color = "#dc2626";
                    statusDiv.innerText = "❌ خطأ في الاتصال: " + error.message;
                    return;
                }

                if (!data || data.length === 0) {
                    statusDiv.style.background = "#fef3c7";
                    statusDiv.style.color = "#92400e";
                    statusDiv.innerText = "⚠️ تم الاتصال بنجاح، ولكن الجدول فارغ تماماً (لا توجد بيانات)";
                    return;
                }

                statusDiv.style.background = "#dcfce7";
                statusDiv.style.color = "#166534";
                statusDiv.innerText = "✅ تم جلب البيانات! انظر للأسماء في الجدول أدناه";

                // 1. توليد عناوين الجدول بناءً على الأسماء الحقيقية في Supabase
                const keys = Object.keys(data[0]);
                const headerRow = document.getElementById('tableHeader');
                headerRow.innerHTML = keys.map(key => `<th>${key}</th>`).join('');

                // 2. عرض البيانات كما هي مخزنة بالضبط
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = data.map(row => {
                    return `<tr>${keys.map(key => `<td>${row[key] || '-'}</td>`).join('')}</tr>`;
                }).join('');

                // 3. طباعة الأسماء في الكونسول للمطور (أنت)
                console.log("الأسماء الحقيقية للأعمدة في جدولك هي:", keys);

            } catch (err) {
                statusDiv.innerText = "خطأ غير متوقع: " + err.message;
            }
        }

        window.onload = checkData;
    </script>
</body>
</html>
