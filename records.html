<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الحالات - مستشفى السلاح الطبي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --gold-dark: #b8860b; --deep-blue: #0f172a; }
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        
        .container { width: 100%; max-width: 1200px; margin: auto; background: #fff; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--gold); overflow: hidden; }
        
        .header { background: var(--deep-blue); color: var(--gold); padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; font-size: 20px; }

        .search-area { background: #f8fafc; padding: 15px; border-bottom: 1px solid #eee; }
        #searchInput { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #e2e8f0; font-family: 'Cairo'; outline: none; }
        #searchInput:focus { border-color: var(--gold); }

        .table-container { padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: #f8fafc; padding: 15px; text-align: right; border-bottom: 2px solid var(--gold); color: var(--deep-blue); font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; color: #333; }

        .badge { padding: 4px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .mil { background: #dcfce7; color: #166534; } /* عسكري */
        .civ { background: #fef3c7; color: #92400e; } /* مدني */

        .actions button { border: none; background: none; cursor: pointer; font-size: 18px; margin: 0 5px; }
        .btn-print { color: var(--gold-dark); }
        .btn-delete { color: #dc2626; }

        .footer-nav { background: #f8fafc; padding: 15px; display: flex; gap: 20px; border-top: 1px solid #eee; }
        .footer-nav a { text-decoration: none; color: var(--deep-blue); font-weight: bold; font-size: 14px; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>📁 سجل متابعة الحالات الرقمي</h1>
            <small>قسم النفسية - مستشفى السلاح الطبي بورتسودان</small>
        </div>
        <div id="statsCount" style="font-size: 14px; font-weight: bold;"></div>
    </div>

    <div class="search-area no-print">
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="🔍 ابحث بالاسم، الكود، التشخيص أو الوحدة...">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>كود المريض</th>
                    <th>النوع</th>
                    <th>التشخيص</th>
                    <th>الهاتف</th>
                    <th>الوحدة / العنوان</th>
                    <th>الملاحظات</th>
                    <th class="no-print">إجراءات</th>
                </tr>
            </thead>
            <tbody id="recordsList">
                </tbody>
        </table>
    </div>

    <div class="footer-nav no-print">
        <a href="add-patient.html">➕ إضافة مريض جديد</a>
        <a href="index.html" style="color: #dc2626;">🚪 خروج</a>
    </div>
</div>

<script>
    const S_URL = 'https://kqauubmsyrvsqtcqjfch.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYXV1Ym1zeXJ2c3F0Y3FqZmNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NDI3NDMsImV4cCI6MjA5MzUxODc0M30.jDJb85oG4PZlwo7hwzsNtBbn9TqjQDxjPedxu4wApCc';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    async function loadRecords() {
        const { data, error } = await _supabase
            .from('psychiatry_patients')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            console.error("خطأ:", error);
            return;
        }

        const table = document.getElementById('recordsList');
        document.getElementById('statsCount').innerText = `إجمالي الحالات: ${data.length}`;
        
        table.innerHTML = data.map(p => {
            const pData = JSON.stringify(p).replace(/'/g, "\\'");
            return `
                <tr>
                    <td><b>${p.patient_code || '-'}</b></td>
                    <td><span class="badge ${p.patient_type === 'عسكري' ? 'mil' : 'civ'}">${p.patient_type || 'غير محدد'}</span></td>
                    <td>${p.diagnosis || '-'}</td>
                    <td>${p.phone || '-'}</td>
                    <td>${p.patient_type === 'عسكري' ? (p.unit || '-') : (p.address || '-')}</td>
                    <td>${p.notes || '-'}</td>
                    <td class="actions no-print">
                        <button class="btn-print" title="طباعة تقرير" onclick='printSingleRecord(${pData})'>🖨️</button>
                        <button class="btn-delete" title="حذف" onclick="deleteRecord('${p.id}', '${p.patient_code}')">🗑️</button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function filterTable() {
        let val = document.getElementById("searchInput").value.toLowerCase();
        let rows = document.getElementById("recordsList").getElementsByTagName("tr");
        for (let row of rows) {
            row.style.display = row.innerText.toLowerCase().includes(val) ? "" : "none";
        }
    }

    function printSingleRecord(p) {
        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <html dir="rtl">
            <head>
                <title>تقرير_${p.patient_code}</title>
                <style>
                    body { font-family: 'Cairo', sans-serif; padding: 40px; border: 5px solid #0f172a; }
                    h2 { text-align: center; color: #0f172a; border-bottom: 2px solid #d4af37; padding-bottom: 10px; }
                    .info { margin-top: 30px; font-size: 18px; }
                    .info div { margin-bottom: 15px; }
                    .label { font-weight: bold; width: 150px; display: inline-block; }
                </style>
            </head>
            <body>
                <h2>مستشفى السلاح الطبي - قسم الصحة النفسية</h2>
                <div class="info">
                    <div><span class="label">كود المريض:</span> ${p.patient_code}</div>
                    <div><span class="label">نوع المريض:</span> ${p.patient_type}</div>
                    <div><span class="label">التشخيص:</span> ${p.diagnosis}</div>
                    <div><span class="label">الهاتف:</span> ${p.phone || '-'}</div>
                    <div><span class="label">الوحدة/العنوان:</span> ${p.patient_type === 'عسكري' ? p.unit : p.address}</div>
                    <div><span class="label">الملاحظات:</span> ${p.notes || '-'}</div>
                </div>
                <div style="margin-top: 50px; text-align: left;">توقيع الطبيب: .....................</div>
                <script>window.onload = function() { window.print(); window.close(); }<\/script>
            </body>
            </html>
        `);
    }

    async function deleteRecord(id, code) {
        if(confirm(`هل تريد حذف السجل ${code} نهائياً؟`)) {
            const { error } = await _supabase.from('psychiatry_patients').delete().eq('id', id);
            if(!error) loadRecords();
        }
    }

    window.onload = loadRecords;
</script>

</body>
</html>
