<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الحالات - نظام المتابعة الرقمي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; margin: 0; }
        #lockScreen { background: white; padding: 40px; border-radius: 20px; width: 320px; margin: 100px auto; text-align: center; }
        #mainContent { display: none; padding: 20px; background: #f1f5f9; min-height: 100vh; }
        .page-header { text-align: center; margin-bottom: 30px; }
        table { width: 100%; max-width: 1000px; margin: auto; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th { background: #1e3a8a; color: white; padding: 12px; text-align: right; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .print-btn { background: #059669; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div id="lockScreen">
        <h2 style="color:#1e3a8a">فتح سجل الحالات</h2>
        <input type="password" id="adminPass" style="width:100%; padding:10px; margin-bottom:15px;" placeholder="كلمة المرور">
        <button onclick="unlock()" style="width:100%; padding:10px; background:#1e3a8a; color:white; border:none; cursor:pointer;">دخول</button>
    </div>

    <div id="mainContent">
        <div class="page-header">
            <h4 style="margin:0; color:#64748b;">منطقة البحر الأحمر العسكرية</h4>
            <h1 style="margin:5px 0; color:#1e3a8a;">مستشفى السلاح الطبي</h1>
            <h2 style="margin:0; color:#d4af37;">سجل نظام المتابعة الرقمي</h2>
        </div>

        <table>
            <thead>
                <tr>
                    <th>الكود</th>
                    <th>التشخيص</th>
                    <th>التاريخ</th>
                    <th class="no-print">إجراءات</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div style="text-align:center; margin-top:20px;" class="no-print">
            <a href="add-patient.html">➕ إضافة مريض جديد</a>
        </div>
    </div>

    <script>
        const S_URL = 'https://kqauubmsyrvsqtcqjfch.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYXV1Ym1zeXJ2c3F0Y3FqZmNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NDI3NDMsImV4cCI6MjA5MzUxODc0M30.jDJb85oG4PZlwo7hwzsNtBbn9TqjQDxjPedxu4wApCc';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        function unlock() {
            if(document.getElementById('adminPass').value === "Ateya2026") {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                loadData();
            } else { alert("خطأ!"); }
        }

        async function loadData() {
            const { data } = await _supabase.from('psychiatry_patients').select('*').order('created_at', { ascending: false });
            if(data) {
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                data.forEach(p => {
                    tbody.innerHTML += `<tr>
                        <td><b>${p.patient_code}</b></td>
                        <td>${p.diagnosis}</td>
                        <td>${new Date(p.created_at).toLocaleDateString('ar-EG')}</td>
                        <td class="no-print">
                            <button class="print-btn" onclick='printReport(${JSON.stringify(p)})'>🖨️ طباعة</button>
                        </td>
                    </tr>`;
                });
            }
        }

        function printReport(p) {
            const win = window.open('', '_blank');
            win.document.write(`
                <html dir="rtl">
                <head>
                    <style>
                        body { font-family: 'Cairo', sans-serif; padding: 40px; }
                        .h { display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 10px; }
                        .content { margin-top: 30px; border: 1px solid #ccc; padding: 20px; }
                    </style>
                </head>
                <body>
                    <div class="h">
                        <div>
                            <h3>منطقة البحر الأحمر العسكرية</h3>
                            <h1>مستشفى السلاح الطبي</h1>
                            <h4>نظام المتابعة الرقمي</h4>
                        </div>
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/Emblem_of_Sudan.svg/1000px-Emblem_of_Sudan.svg.png" style="width:80px;">
                    </div>
                    <div class="content">
                        <p><b>كود المريض:</b> ${p.patient_code}</p>
                        <p><b>التشخيص:</b> ${p.diagnosis}</p>
                        <p><b>التاريخ:</b> ${new Date(p.created_at).toLocaleDateString('ar-EG')}</p>
                    </div>
                    <script>window.print();<\/script>
                </body>
                </html>
            `);
            win.document.close();
        }
    </script>
</body>
</html>
