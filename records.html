<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الحالات - مستشفى السلاح الطبي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --gold-dark: #b8860b; --deep-blue: #0f172a; }
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        
        .container { width: 100%; max-width: 1150px; margin: auto; background: #fff; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--gold); overflow: hidden; }
        
        .header { background: var(--deep-blue); color: var(--gold); padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; font-size: 22px; }

        /* شريط البحث */
        .search-area { background: #f8fafc; padding: 15px 20px; border-bottom: 1px solid #eee; }
        #searchInput { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #e2e8f0; font-family: 'Cairo'; outline: none; transition: 0.3s; }
        #searchInput:focus { border-color: var(--gold); }

        .table-container { padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #f8fafc; padding: 15px; text-align: right; border-bottom: 2px solid var(--gold); color: var(--deep-blue); }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; color: #444; }

        .badge { padding: 4px 8px; border-radius: 5px; font-size: 11px; font-weight: bold; }
        .mil { background: #dcfce7; color: #166534; } /* عسكري */
        .civ { background: #fef3c7; color: #92400e; } /* مدني */

        /* أزرار الإجراءات */
        .actions button { border: none; background: none; cursor: pointer; font-size: 18px; margin: 0 5px; transition: 0.2s; }
        .actions button:hover { transform: scale(1.2); }
        .btn-print-single { color: var(--gold-dark); }
        .btn-delete { color: #dc2626; }

        .footer-nav { background: #f8fafc; padding: 15px; display: flex; gap: 20px; border-top: 1px solid #eee; }
        .footer-nav a { text-decoration: none; color: var(--deep-blue); font-weight: bold; font-size: 14px; }

        /* خاص بالطباعة العامة */
        @media print {
            .search-area, .actions, .footer-nav, .header button { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>📁 سجل متابعة الحالات الرقمي</h1>
            <small>قسم النفسية - مستشفى السلاح الطبي بورتسودان</small>
        </div>
        <div id="statsCount" style="font-size: 14px;">جاري تحديث البيانات...</div>
    </div>

    <div class="search-area no-print">
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="🔍 ابحث بكود المريض، الاسم، التشخيص أو الوحدة...">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>الكود</th>
                    <th>النوع</th>
                    <th>التشخيص</th>
                    <th>الهاتف</th>
                    <th>العنوان/الوحدة</th>
                    <th class="no-print">الإجراءات</th>
                </tr>
            </thead>
            <tbody id="recordsList">
                </tbody>
        </table>
    </div>

    <div class="footer-nav no-print">
        <a href="add-patient.html">➕ إضافة مريض جديد</a>
        <a href="index.html" style="color: #dc2626;">🚪 خروج</a>
    </div>
</div>

<script>
    // إعدادات Supabase الخاصة بك
    const S_URL = 'https://kqauubmsyrvsqtcqjfch.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYXV1Ym1zeXJ2c3F0Y3FqZmNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NDI3NDMsImV4cCI6MjA5MzUxODc0M30.jDJb85oG4PZlwo7hwzsNtBbn9TqjQDxjPedxu4wApCc';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    async function loadRecords() {
        const { data, error } = await _supabase
            .from('psychiatry_patients')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            console.error("خطأ:", error);
            return;
        }

        const table = document.getElementById('recordsList');
        document.getElementById('statsCount').innerText = `إجمالي المسجلين: ${data.length}`;
        
        table.innerHTML = data.map(p => {
            // تجهيز البيانات للطباعة
            const pData = JSON.stringify(p).replace(/'/g, "\\'");
            return `
                <tr>
                    <td><b>${p.patient_code}</b></td>
                    <td><span class="badge ${p.patient_type === 'عسكري' ? 'mil' : 'civ'}">${p.patient_type}</span></td>
                    <td>${p.diagnosis}</td>
                    <td>${p.phone || '-'}</td>
                    <td>${p.patient_type === 'عسكري' ? p.unit : p.address}</td>
                    <td class="actions no-print">
                        <button class="btn-print-single" title="طباعة تقرير فردي" onclick='printSingleRecord(${pData})'>🖨️</button>
                        <button class="btn-delete" title="حذف" onclick="deleteRecord('${p.id}', '${p.patient_code}')">🗑️</button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    // دالة البحث اللحظي
    function filterTable() {
        let val = document.getElementById("searchInput").value.toLowerCase();
        let rows = document.getElementById("recordsList").getElementsByTagName("tr");
        for (let row of rows) {
            row.style.display = row.innerText.toLowerCase().includes(val) ? "" : "none";
        }
    }

    // دالة طباعة تقرير مريض واحد (نموذج رسمي)
    function printSingleRecord(p) {
        const printWindow = window.open('', '_blank');
        const reportDate = new Date(p.created_at).toLocaleDateString('ar-EG');
        
        printWindow.document.write(`
            <html dir="rtl">
            <head>
                <title>تقرير_مريض_${p.patient_code}</title>
                <style>
                    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
                    body { font-family: 'Cairo', sans-serif; padding: 50px; color: #333; line-height: 1.6; }
                    .header { text-align: center; border-bottom: 3px solid #0f172a; margin-bottom: 40px; padding-bottom: 10px; }
                    .box { border: 1px solid #d4af37; padding: 25px; border-radius: 10px; background: #fffcf5; }
                    .row { margin-bottom: 15px; font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
                    .label { font-weight: bold; color: #0f172a; width: 150px; display: inline-block; }
                    .footer { margin-top: 100px; display: flex; justify-content: space-between; font-weight: bold; }
                </style>
            </head>
            <body>
                <div class="header">
                    <h2>مستشفى السلاح الطبي - بورتسودان</h2>
                    <h3>قسم الصحة النفسية - تقرير مراجعة</h3>
                </div>
                <div class="box">
                    <div class="row"><span class="label">تاريخ السجل:</span> ${reportDate}</div>
                    <div class="row"><span class="label">كود المريض:</span> ${p.patient_code}</div>
                    <div class="row"><span class="label">نوع المريض:</span> ${p.patient_type}</div>
                    <div class="row"><span class="label">التشخيص:</span> ${p.diagnosis}</div>
                    <div class="row"><span class="label">الهاتف:</span> ${p.phone || '-'}</div>
                    <div class="row" style="border:none;"><span class="label">ملاحظات:</span><br>${p.notes || 'لا يوجد'}</div>
                </div>
                <div class="footer">
                    <span>توقيع الطبيب المختص: ...........</span>
                    <span>ختم القسم: ...........</span>
                </div>
                <script>window.onload = function() { window.print(); window.close(); }<\/script>
            </body>
            </html>
        `);
        printWindow.document.close();
    }

    async function deleteRecord(id, code) {
        if(confirm(\`هل أنت متأكد من حذف المريض ذو الكود (\${code}) نهائياً؟\`)) {
            const { error } = await _supabase.from('psychiatry_patients').delete().eq('id', id);
            if(!error) loadRecords();
            else alert("عذراً، تعذر الحذف حالياً.");
        }
    }

    window.onload = loadRecords;
</script>

</body>
</html>
