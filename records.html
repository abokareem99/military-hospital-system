<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الحالات - مستشفى السلاح الطبي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --gold-dark: #b8860b; --deep-blue: #0f172a; }
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #020617 0%, #1e293b 100%); margin: 0; padding: 20px; color: #fff; min-height: 100vh; }
        
        .container { width: 100%; max-width: 800px; margin: auto; background: #ffffff; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5); border-top: 8px solid var(--gold); }
        
        .header { background: #1e293b; padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); }
        .header h1 { margin: 0; font-size: 20px; color: var(--gold); }
        
        .table-container { padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; color: #333; text-align: right; }
        th { background: #f1f5f9; color: var(--deep-blue); padding: 12px; border-bottom: 2px solid var(--gold); }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        tr:hover { background: #fffdf5; }

        .status-badge { background: #eef2ff; color: var(--gold-dark); padding: 4px 10px; border-radius: 8px; font-weight: bold; font-size: 12px; }

        .footer-nav { background: #f8fafc; padding: 15px 25px; display: flex; justify-content: space-between; border-top: 1px solid #eee; }
        .btn-back { text-decoration: none; color: var(--deep-blue); font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .btn-back:hover { color: var(--gold-dark); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📁 سجل حالات قسم النفسية</h1>
        <p style="margin: 5px 0 0; font-size: 12px; color: #ccc;">مستشفى السلاح الطبي - بورتسودان</p>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>كود المريض</th>
                    <th>التشخيص</th>
                    <th>التاريخ</th>
                    <th>الإجراء</th>
                </tr>
            </thead>
            <tbody id="recordsTable">
                <tr>
                    <td>Ps-101</td>
                    <td><span class="status-badge">قلق عام</span></td>
                    <td>2026/05/15</td>
                    <td style="color: var(--gold-dark); cursor: pointer;">عرض التفاصيل</td>
                </tr>
                <tr>
                    <td>Ps-102</td>
                    <td><span class="status-badge">إكتئاب</span></td>
                    <td>2026/05/14</td>
                    <td style="color: var(--gold-dark); cursor: pointer;">عرض التفاصيل</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="footer-nav">
        <a href="add-patient.html" class="btn-back">➕ إضافة مريض جديد</a>
        <a href="index.html" style="color: #dc2626; text-decoration: none; font-weight: bold;">🚪 خروج</a>
    </div>
</div>

</body>
</html>
