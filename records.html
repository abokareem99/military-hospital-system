<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الحالات - مستشفى السلاح الطبي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --gold-dark: #b8860b; --deep-blue: #0f172a; }
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 1100px; margin: auto; background: #fff; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--gold); overflow: hidden; }
        .header { background: var(--deep-blue); color: var(--gold); padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .search-area { background: #f8fafc; padding: 15px; border-bottom: 1px solid #eee; }
        #searchInput { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-family: 'Cairo'; }
        .table-container { padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #f8fafc; padding: 15px; text-align: right; border-bottom: 2px solid var(--gold); color: var(--deep-blue); }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .btn-print { background: var(--gold); border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .footer-nav { background: #f8fafc; padding: 15px; display: flex; gap: 15px; }
        .footer-nav a { text-decoration: none; color: var(--deep-blue); font-weight: bold; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>📁 سجل متابعة الحالات الرقمي</h1>
            <small>قسم النفسية - مستشفى السلاح الطبي بورتسودان</small>
        </div>
    </div>

    <div class="search-area no-print">
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="🔍 ابحث بالكود أو التشخيص...">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>الكود</th>
                    <th>التشخيص</th>
                    <th>الملاحظات</th>
                    <th>التاريخ</th>
                    <th class="no-print">الإجراءات</th>
                </tr>
            </thead>
            <tbody id="recordsList">
                </tbody>
        </table>
    </div>

    <div class="footer-nav no-print">
        <a href="add-patient.html">➕ إضافة مريض جديد</a>
        <a href="index.html" style="color: #dc2626;">🚪 خروج</a>
    </div>
</div>

<script>
    const S_URL = 'https://kqauubmsyrvsqtcqjfch.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYXV1Ym1zeXJ2c3F0Y3FqZmNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NDI3NDMsImV4cCI6MjA5MzUxODc0M30.jDJb85oG4PZlwo7hwzsNtBbn9TqjQDxjPedxu4wApCc';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    async function loadRecords() {
        const { data, error } = await _supabase
            .from('psychiatry_patients')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) return;

        const table = document.getElementById('recordsList');
        table.innerHTML = data.map(p => `
            <tr>
                <td><b>${p.patient_code || '-'}</b></td>
                <td>${p.diagnosis || '-'}</td>
                <td>${p.notes || '-'}</td>
                <td>${new Date(p.created_at).toLocaleDateString('ar-EG')}</td>
                <td class="no-print">
                    <button class="btn-print" onclick="printReport('${p.patient_code}', '${p.diagnosis}', '${p.notes}')">🖨️ تقرير</button>
                </td>
            </tr>
        `).join('');
    }

    function filterTable() {
        let val = document.getElementById("searchInput").value.toLowerCase();
        let rows = document.getElementById("recordsList").getElementsByTagName("tr");
        for (let row of rows) {
            row.style.display = row.innerText.toLowerCase().includes(val) ? "" : "none";
        }
    }

    function printReport(code, diag, notes) {
        const win = window.open('', '_blank');
        win.document.write(`
            <div dir="rtl" style="font-family:Arial; padding:30px; border:2px solid #000;">
                <h2>مستشفى السلاح الطبي - تقرير مريض</h2>
                <hr>
                <p><b>كود المريض:</b> ${code}</p>
                <p><b>التشخيص:</b> ${diag}</p>
                <p><b>ملاحظات الطبيب:</b> ${notes}</p>
                <br><br>
                <p>توقيع الطبيب: .....................</p>
            </div>
            <script>window.onload = function() { window.print(); window.close(); }<\/script>
        `);
    }

    window.onload = loadRecords;
</script>

</body>
</html>
