<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الحالات - نظام المتابعة الرقمي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; margin: 0; }
        #lockScreen { background: white; padding: 40px; border-radius: 20px; width: 320px; margin: 100px auto; text-align: center; }
        #mainContent { display: none; padding: 20px; background: #f1f5f9; min-height: 100vh; }
        
        .page-header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 35px; 
            max-width: 1000px; 
            margin-left: auto; 
            margin-right: auto;
            background: white;
            padding: 20px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .header-placeholder { width: 90px; }
        .header-logo { width: 90px; height: 90px; object-fit: contain; order: 2; }
        .header-text { flex-grow: 1; text-align: center; order: 1; }
        .page-header h1 { margin: 0 0 5px 0; color: #1e3a8a; font-size: 26px; font-weight: 900; }
        .page-header h2 { margin: 0 0 5px 0; color: #334155; font-size: 20px; font-weight: 700; }
        .page-header h3 { margin: 0; color: #b45309; font-size: 15px; font-weight: 700; letter-spacing: 0.5px; }

        table { width: 100%; max-width: 1000px; margin: auto; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        th { background: #1e3a8a; color: white; padding: 12px; text-align: right; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .print-btn { background: #059669; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-family: 'Cairo'; font-size: 13px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div id="lockScreen">
        <h2 style="color:#1e3a8a">فتح سجل الحالات</h2>
        <input type="password" id="adminPass" style="width:100%; padding:10px; margin-bottom:15px; box-sizing: border-box; text-align: center;" placeholder="كلمة المرور">
        <button onclick="unlock()" style="width:100%; padding:10px; background:#1e3a8a; color:white; border:none; cursor:pointer; font-family:'Cairo'; font-weight:bold;">دخول</button>
    </div>

    <div id="mainContent">
        <div class="page-header">
            <div class="header-placeholder"></div>
            
            <div class="header-text">
                <h1>منطقة البحر الأحمر العسكرية</h1>
                <h2>مستشفى السلاح الطبي ببورتسودان</h2>
                <h3>سجل نظام المتابعة الرقمي</h3>
            </div>
            
            <img src="icon-512.png" alt="شعار الإدارة الطبية" class="header-logo">
        </div>

        <table>
            <thead>
                <tr>
                    <th>الكود / الاسم</th>
                    <th>التشخيص</th>
                    <th>التاريخ</th>
                    <th class="no-print">إجراءات</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div style="text-align:center; margin-top:25px;" class="no-print">
            <a href="add-patient.html" style="color:#1e3a8a; font-weight:bold; text-decoration:none; font-size:16px;">➕ إضافة مريض جديد</a>
        </div>
    </div>

    <script>
        const S_URL = 'https://kqauubmsyrvsqtcqjfch.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYXV1Ym1zeXJ2c3F0Y3FqZmNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NDI3NDMsImV4cCI6MjA5MzUxODc0M30.jDJb85oG4PZlwo7hwzsNtBbn9TqjQDxjPedxu4wApCc';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        function unlock() {
            if(document.getElementById('adminPass').value === "suha2026") {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                loadData();
            } else { alert("خطأ في كلمة المرور!"); }
        }

        async function loadData() {
            const { data } = await _supabase.from('psychiatry_patients').select('*').order('created_at', { ascending: false });
            if(data) {
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                data.forEach(p => {
                    tbody.innerHTML += `<tr>
                        <td><b>${p.patient_code}</b></td>
                        <td>${p.diagnosis}</td>
                        <td>${p.created_at ? new Date(p.created_at).toLocaleDateString('ar-EG') : ''}</td>
                        <td class="no-print">
                            <button class="print-btn" onclick='printReport(${JSON.stringify(p)})'>🖨️ طباعة التقرير</button>
                        </td>
                    </tr>`;
                });
            }
        }

        function printReport(p) {
            const win = window.open('', '_blank');
            
            // تهيئة بيانات العسكري أو المدني للعرض الذكي في الطباعة
            const secondaryInfoLabel = p.type === 'مدني' ? 'العنوان / السكن:' : 'الوحدة العسكرية والرتبة:';
            const secondaryInfoValue = p.type === 'مدني' ? (p.addr || 'غير محدد') : (p.unit || 'غير محدد');

            win.document.write(`
                <html dir="rtl">
                <head>
                    <title>تقرير طبي - ${p.patient_code}</title>
                    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
                    <style>
                        body { font-family: 'Cairo', sans-serif; padding: 30px; color: #1e293b; }
                        .h { display: flex; justify-content: space-between; border-bottom: 3px solid #1e3a8a; padding-bottom: 15px; align-items: center; }
                        .print-placeholder { width: 85px; }
                        .h-text { flex-grow: 1; text-align: center; }
                        .h-text h1 { margin: 0 0 5px 0; font-size: 24px; font-weight: 900; color: #1e3a8a; }
                        .h-text h2 { margin: 0 0 5px 0; font-size: 19px; font-weight: 700; color: #334155; }
                        .h-text h3 { margin: 0; font-size: 15px; font-weight: 700; color: #b45309; }
                        .print-logo { width: 85px; height: 85px; object-fit: contain; }
                        
                        .section-title { background: #f1f5f9; padding: 6px 12px; font-weight: bold; color: #1e3a8a; border-right: 4px solid #d4af37; margin-top: 25px; font-size: 16px; }
                        
                        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
                        .info-item { font-size: 15px; line-height: 1.6; border-bottom: 1px dashed #cbd5e1; padding-bottom: 6px; }
                        
                        .medical-box { border: 1px solid #cbd5e1; border-radius: 8px; padding: 15px; margin-top: 15px; font-size: 15px; background: #fafafa; white-space: pre-line; line-height: 1.6; }
                        
                        .footer-signature { margin-top: 50px; display: flex; justify-content: space-between; padding: 0 40px; font-weight: bold; font-size: 14px; }
                    </style>
                </head>
                <body>
                    <div class="h">
                        <div class="print-placeholder"></div>
                        <div class="h-text">
                            <h1>منطقة البحر الأحمر العسكرية</h1>
                            <h2>مستشفى السلاح الطبي ببورتسودان</h2>
                            <h3>نظام المتابعة الرقمي - عيادة النفسية</h3>
                        </div>
                        <img src="icon-512.png" class="print-logo" alt="شعار الإدارة" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3063/3063176.png'">
                    </div>

                    <div class="section-title">بيانات المريض الأساسية</div>
                    <div class="grid-info">
                        <div class="info-item"><b>كود المريض / الاسم:</b> ${p.patient_code}</div>
                        <div class="info-item"><b>الفئة:</b> ${p.type || 'غير محدد'}</div>
                        <div class="info-item"><b>العمر:</b> ${p.age ? p.age + ' سنة' : 'غير محدد'}</div>
                        <div class="info-item"><b>رقم الهاتف:</b> ${p.phone || 'غير محدد'}</div>
                        <div class="info-item" style="grid-column: span 2;"><b>${secondaryInfoLabel}</b> ${secondaryInfoValue}</div>
                    </div>

                    <div class="section-title">التشخيص الحالي</div>
                    <div class="medical-box"><b>${p.diagnosis}</b></div>

                    <div class="section-title">الخطة العلاجية والأدوية الموصوفة</div>
                    <div class="medical-box">${p.treatment || 'لا توجد أدوية مسجلة حالياً.'}</div>

                    <div class="section-title">التوصيات الطبية والملاحظات</div>
                    <div class="medical-box">${p.notes || 'متابعة حسب التوجيهات الطبية.'}</div>

                    <div class="footer-signature">
                        <div>تاريخ التقرير: ${p.created_at ? new Date(p.created_at).toLocaleDateString('ar-EG') : new Date().toLocaleDateString('ar-EG')}</div>
                        <div>توقيع وختم الطبيب المعالج: ............................</div>
                    </div>

                    <script>
                        window.onload = function() {
                            setTimeout(function() { window.print(); }, 400);
                        };
                    <\/script>
                </body>
                </html>
            `);
            win.document.close();
        }
    </script>
</body>
</html>
