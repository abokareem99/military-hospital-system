<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الحالات - السلاح الطبي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        #lockScreen { background: white; padding: 40px; border-radius: 20px; width: 350px; text-align: center; align-self: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #mainContent { display: none; width: 100%; background: #f1f5f9; padding: 20px; }
        .stats { display: flex; gap: 15px; margin-bottom: 20px; max-width: 1000px; margin-inline: auto; }
        .stat-card { flex: 1; background: white; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 5px solid #1e3a8a; }
        table { width: 100%; max-width: 1000px; margin: auto; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        th { background: #1e3a8a; color: white; padding: 15px; text-align: right; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; }
        .badge { padding: 4px 10px; border-radius: 5px; color: white; font-size: 12px; font-weight: bold; }
        .btn-print { background: #059669; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; margin-bottom: 20px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div id="lockScreen">
        <img src="logo.png" width="80" alt="logo"><br><br>
        <input type="password" id="adminPass" style="width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:1px solid #ddd; text-align:center;" placeholder="كلمة مرور السجلات">
        <button onclick="unlock()" style="width:100%; padding:12px; background:#1e3a8a; color:white; border:none; border-radius:8px; cursor:pointer;">فتح السجل</button>
    </div>

    <div id="mainContent">
        <div style="max-width:1000px; margin:auto; text-align:center;">
            <h2 style="color:#1e3a8a">سجل الحالات الرسمي - السلاح الطبي</h2>
            <button class="btn-print no-print" onclick="window.print()">🖨️ طباعة التقرير</button>
            <div class="stats">
                <div class="stat-card"><h3>إجمالي الحالات</h3><div id="total" style="font-size:24px; font-weight:bold; color:#1e3a8a">0</div></div>
                <div class="stat-card"><h3>الأكثر شيوعاً</h3><div id="common" style="font-size:18px; font-weight:bold; color:#059669">-</div></div>
            </div>
            <table>
                <thead>
                    <tr><th>الكود</th><th>التشخيص</th><th>الملاحظات</th><th>التاريخ</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div style="margin-top:20px;" class="no-print">
                <a href="add-patient.html" style="color:#1e3a8a; font-weight:bold; text-decoration:none;">➕ إضافة حالة جديدة</a>
            </div>
        </div>
    </div>

    <script>
        const S_URL = 'https://kqauubmsyrvsqtcqjfch.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYXV1Ym1zeXJ2c3F0Y3FqZmNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NDI3NDMsImV4cCI6MjA5MzUxODc0M30.jDJb85oG4PZlwo7hwzsNtBbn9TqjQDxjPedxu4wApCc';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        function unlock() {
            if(document.getElementById('adminPass').value === "Ateya2026") {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                document.body.style.background = "#f1f5f9";
                loadData();
            } else { alert("خطأ!"); }
        }

        async function loadData() {
            const { data, error } = await _supabase.from('hospital_patients').select('*').order('created_at', { ascending: false });
            if(data) {
                document.getElementById('total').innerText = data.length;
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                const counts = {};
                data.forEach(p => {
                    counts[p.diagnosis] = (counts[p.diagnosis] || 0) + 1;
                    let color = p.diagnosis === 'فصام' ? '#dc2626' : '#1e3a8a';
                    tbody.innerHTML += `<tr>
                        <td><b>${p.patient_code}</b></td>
                        <td><span class="badge" style="background:${color}">${p.diagnosis}</span></td>
                        <td style="font-size:13px">${p.notes || '-'}</td>
                        <td>${new Date(p.created_at).toLocaleDateString('ar-EG')}</td>
                    </tr>`;
                });
                document.getElementById('common').innerText = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b, "-");
            }
        }
    </script>
</body>
</html>
