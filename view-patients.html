<div style="display: flex; gap: 15px; margin-bottom: 20px; justify-content: center;">
    <div style="background: #2563eb; color: white; padding: 15px; border-radius: 10px; text-align: center; flex: 1;">
        <div style="font-size: 14px;">إجمالي الحالات</div>
        <div id="totalPatients" style="font-size: 24px; font-weight: bold;">0</div>
    </div>
    <div style="background: #10b981; color: white; padding: 15px; border-radius: 10px; text-align: center; flex: 1;">
        <div style="font-size: 14px;">أكثر تشخيص تكراراً</div>
        <div id="topDiagnosis" style="font-size: 18px; font-weight: bold;">-</div>
    </div>
</div>

<script>
    // أضف هذا الجزء داخل وظيفة loadPatients بعد جلب البيانات (Data)
    function updateStats(data) {
        document.getElementById('totalPatients').innerText = data.length;
        
        if(data.length > 0) {
            const counts = {};
            data.forEach(p => { counts[p.diagnosis] = (counts[p.diagnosis] || 0) + 1; });
            const top = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
            document.getElementById('topDiagnosis').innerText = top;
        }
    }
    // تذكر استدعاء updateStats(data) داخل الـ Else الخاصة بجلب البيانات
</script>
