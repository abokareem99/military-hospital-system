<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجلات السلاح الطبي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; background: white; padding: 20px; border-radius: 15px; border-right: 10px solid #1e3a8a; }
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-box h3 { margin: 0; color: #1e3a8a; font-size: 28px; }
        .stat-box p { margin: 5px 0 0; color: #64748b; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        th { background: #1e3a8a; color: white; padding: 15px; text-align: right; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; }
        .badge { padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; color: white; }
        
        @media print { .no-print { display: none; } body { background: white; } }
        .btn-print { background: #059669; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; color:#1e3a8a;">سجل حالات قسم النفسية</h2>
    <p style="margin:5px 0; color:#64748b;">المستشفى العسكري - بورتسودان</p>
    <button class="btn-print no-print" onclick="window.print()">🖨️ طباعة التقرير الحالي</button>
</div>

<div class="stats-container">
    <div class="stat-box">
        <h3 id="count">0</h3>
        <p>إجمالي الحالات</p>
    </div>
    <div class="stat-box">
        <h3 id="topDiag" style="font-size:18px">-</h3>
        <p>أكثر الحالات انتشاراً</p>
    </div>
</div>

<table>
    <thead>
        <tr>
            <th>كود المريض</th>
            <th>التشخيص</th>
            <th>ملاحظات الطبيب</th>
            <th>تاريخ التسجيل</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<div style="text-align:center; margin-top:30px;" class="no-print">
    <a href="add-patient.html" style="color:#1e3a8a; font-weight:bold; text-decoration:none;">➕ إضافة حالة جديدة</a>
</div>

<script>
    const S_URL = 'https://kqauubmsyrvsqtcqjfch.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYXV1Ym1zeXJ2c3F0Y3FqZmNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NDI3NDMsImV4cCI6MjA5MzUxODc0M30.jDJb85oG4PZlwo7hwzsNtBbn9TqjQDxjPedxu4wApCc';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    async function loadData() {
        const { data, error } = await _supabase.from('hospital_patients').select('*').order('created_at', { ascending: false });
        if(data) {
            document.getElementById('count').innerText = data.length;
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            const counts = {};
            data.forEach(p => {
                counts[p.diagnosis] = (counts[p.diagnosis] || 0) + 1;
                let color = p.diagnosis === 'فصام' ? '#dc2626' : (p.diagnosis === 'اكتئاب' ? '#2563eb' : '#4b5563');
                
                tbody.innerHTML += `<tr>
                    <td><b>${p.patient_code}</b></td>
                    <td><span class="badge" style="background:${color}">${p.diagnosis}</span></td>
                    <td style="font-size:14px; color:#475569">${p.notes || '-'}</td>
                    <td>${new Date(p.created_at).toLocaleDateString('ar-EG')}</td>
                </tr>`;
            });
            const top = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b, "-");
            document.getElementById('topDiag').innerText = top;
        }
    }
    loadData();
</script>
</body>
</html>
